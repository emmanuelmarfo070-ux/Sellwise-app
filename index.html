<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellWise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-black text-white p-5 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-black italic">Sell<span class="text-yellow-400">Wise</span></h1>
        <div id="user-tag" class="text-[10px] font-black border border-yellow-400 px-3 py-1 rounded-full text-yellow-400 uppercase"></div>
    </header>

    <main class="p-6 max-w-lg mx-auto">
        <section class="bg-white rounded-[2.5rem] p-8 shadow-2xl border border-gray-100 text-center">
            <div id="preview-box" class="hidden mb-6">
                <img id="img-out" class="w-full h-72 object-contain rounded-3xl bg-gray-50 shadow-inner">
            </div>

            <label id="input-label" class="cursor-pointer block py-16 border-2 border-dashed border-gray-200 rounded-[2rem] hover:bg-yellow-50 transition">
                <div class="bg-yellow-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-plus text-2xl text-yellow-600"></i>
                </div>
                <p class="font-black text-gray-800 text-lg">Tap to Scan Item</p>
                <input type="file" id="file-in" class="hidden" accept="image/*">
            </label>

            <div id="loader" class="hidden py-8">
                <div class="loading-spinner"></div>
                <p class="mt-4 font-black text-sm text-gray-600 tracking-tight">AI is pricing your item...</p>
            </div>

            <div id="output" class="hidden text-left space-y-5">
                <div class="bg-yellow-400 p-6 rounded-[2rem] shadow-xl">
                    <p class="text-[10px] font-black uppercase tracking-tighter text-yellow-900">Recommended Price</p>
                    <h2 id="price-out" class="text-4xl font-black mt-1"></h2>
                </div>
                <div class="bg-gray-900 text-white p-6 rounded-[2rem] shadow-xl">
                    <p class="text-[10px] text-yellow-400 font-black uppercase tracking-widest">Sales Caption</p>
                    <p id="caption-out" class="text-sm mt-3 font-medium italic leading-relaxed"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-5 bg-black text-white rounded-2xl font-black shadow-lg hover:opacity-90 active:scale-95 transition">SCAN NEW ITEM</button>
            </div>
        </section>
    </main>

    <script type="module">
        const API_KEY = "AIzaSyB0iQEws1bPOVwy769GmE-Un_PDV4oBZBU";
        const user = localStorage.getItem('sw_user') || "Seller";
        const market = localStorage.getItem('sw_market') || "Ghana (GHS)";

        document.getElementById('user-tag').innerText = user;

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('input-label').classList.add('hidden');
            document.getElementById('preview-box').classList.remove('hidden');
            document.getElementById('img-out').src = URL.createObjectURL(file);
            document.getElementById('loader').classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    // UPDATED MODEL NAME TO gemini-2.0-flash
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{ parts: [
                                {text: `Identify this product for the ${market} market. 1. Give a realistic selling price in local currency. 2. Write a short catchy sales caption with local slang. Return ONLY as JSON: {"price":"...", "caption":"..."}`},
                                {inline_data: {mime_type: file.type, data: base64}}
                            ]}]
                        })
                    });

                    const resData = await resp.json();
                    
                    if(resData.error) {
                        alert("AI Response: " + resData.error.message);
                        location.reload();
                        return;
                    }

                    // Extract text carefully
                    let rawText = resData.candidates[0].content.parts[0].text;
                    // Remove markdown code blocks if AI adds them
                    rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    const json = JSON.parse(rawText);

                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('output').classList.remove('hidden');
                    document.getElementById('price-out').innerText = json.price;
                    document.getElementById('caption-out').innerText = json.caption;

                } catch (err) {
                    console.error(err);
                    alert("Chale, let's try one more time! The market is a bit busy.");
                    location.reload();
                }
            };
        };
    </script>
</body>
</html>
