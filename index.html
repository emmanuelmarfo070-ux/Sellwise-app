<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellWise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-black text-white p-5 flex justify-between items-center">
        <h1 class="text-xl font-bold text-yellow-400">SellWise</h1>
        <div id="user-tag" class="text-[10px] font-bold border border-yellow-400 px-2 py-1 rounded"></div>
    </header>

    <main class="p-6 max-w-lg mx-auto">
        <section class="bg-white rounded-[2rem] p-8 shadow-xl border border-gray-100 text-center">
            <div id="preview-box" class="hidden mb-4">
                <img id="img-out" class="w-full h-64 object-contain rounded-2xl bg-gray-50">
            </div>

            <label id="input-label" class="cursor-pointer block py-12 border-2 border-dashed border-gray-200 rounded-[2rem]">
                <i class="fas fa-camera text-3xl text-gray-300 mb-4"></i>
                <p class="font-bold text-gray-800">Upload Product Photo</p>
                <input type="file" id="file-in" class="hidden" accept="image/*">
            </label>

            <div id="loader" class="hidden py-8">
                <div class="loading-spinner"></div>
                <p class="mt-4 font-bold text-sm">AI is analyzing price...</p>
            </div>

            <div id="output" class="hidden text-left space-y-4">
                <div class="bg-yellow-400 p-6 rounded-2xl">
                    <p class="text-[10px] font-bold uppercase">Market Price</p>
                    <h2 id="price-out" class="text-3xl font-black"></h2>
                </div>
                <div class="bg-gray-900 text-white p-6 rounded-2xl">
                    <p class="text-[10px] text-yellow-400 font-bold uppercase">Sales Caption</p>
                    <p id="caption-out" class="text-sm mt-2 italic"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-black text-white rounded-xl font-bold">SCAN AGAIN</button>
            </div>
        </section>
    </main>

    <script type="module">
        const API_KEY = "AIzaSyB0iQEws1bPOVwy769GmE-Un_PDV4oBZBU";
        const user = localStorage.getItem('sw_user') || "Reseller";
        const market = localStorage.getItem('sw_market') || "Ghana (GHS)";

        document.getElementById('user-tag').innerText = user.toUpperCase();

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('input-label').classList.add('hidden');
            document.getElementById('preview-box').classList.remove('hidden');
            document.getElementById('img-out').src = URL.createObjectURL(file);
            document.getElementById('loader').classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{ parts: [
                                {text: `Identify this product for the ${market} market. Give a realistic street price and a caption with slang. Return ONLY JSON: {"price":"...", "caption":"..."}`},
                                {inline_data: {mime_type: file.type, data: base64}}
                            ]}]
                        })
                    });

                    const resData = await resp.json();
                    
                    if(resData.error) {
                        alert("API Error: " + resData.error.message);
                        location.reload();
                        return;
                    }

                    const txt = resData.candidates[0].content.parts[0].text;
                    const json = JSON.parse(txt.match(/\{.*\}/s)[0]);

                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('output').classList.remove('hidden');
                    document.getElementById('price-out').innerText = json.price;
                    document.getElementById('caption-out').innerText = json.caption;

                } catch (err) {
                    alert("Logic Error: " + err.message);
                    location.reload();
                }
            };
        };
    </script>
</body>
</html>
