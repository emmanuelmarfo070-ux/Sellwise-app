<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellWise | International Reseller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .brand-accent { color: #fcd116; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        #signup-modal { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-black text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black">Sell<span class="brand-accent">Wise</span></h1>
                <select id="market-selector" class="bg-gray-800 text-[10px] text-white border-none rounded px-1 focus:ring-0">
                    <option value="Ghana Cedis (GH₵)">🇬🇭 Ghana</option>
                    <option value="Nigerian Naira (₦)">🇳🇬 Nigeria</option>
                </select>
            </div>
            <div id="user-display">
                <button onclick="toggleModal(true)" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700 transition">
                    Sign Up
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-lg">
        <section id="upload-section" class="glass-card rounded-3xl shadow-xl p-6 mb-6 border-2 border-dashed border-blue-200 text-center">
            <div id="preview-container" class="hidden mb-4"><img id="image-preview" class="w-full h-64 object-cover rounded-2xl shadow-md"></div>
            <label class="cursor-pointer">
                <div id="upload-placeholder" class="py-10">
                    <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-camera text-2xl text-blue-600"></i></div>
                    <p class="text-gray-800 font-bold text-lg">Snap Product</p>
                    <p class="text-gray-500 text-xs mt-2">Upload to get Ghana/Nigeria pricing</p>
                </div>
                <input type="file" id="image-input" class="hidden" accept="image/*" onchange="alert('We will connect Gemini in Step 4!')">
            </label>
        </section>
    </main>

    <div id="signup-modal" class="fixed inset-0 z-[100] bg-black bg-opacity-80 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-2">Join SellWise</h2>
            <button onclick="toggleModal(false)" class="w-full text-gray-400 text-xs mt-4 uppercase font-bold tracking-widest">Close</button>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('signup-modal').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
