<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellWise | AI Reseller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .brand-accent { color: #fcd116; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        #signup-modal { display: none; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-black text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black">Sell<span class="brand-accent">Wise</span></h1>
            <div id="auth-section">
                <button onclick="toggleModal(true)" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">Sign Up</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-lg">
        <div id="welcome-msg" class="mb-6 hidden text-center">
            <h2 class="text-2xl font-black italic">Sell like a Pro! 🚀</h2>
            <p class="text-gray-500 text-sm">Market: <span id="market-display" class="font-bold text-blue-600"></span></p>
        </div>

        <section class="glass-card rounded-3xl shadow-xl p-8 border-2 border-dashed border-blue-200 text-center">
            <div id="preview-container" class="hidden mb-4">
                <img id="image-preview" class="w-full h-64 object-cover rounded-2xl shadow-md">
            </div>
            
            <label class="cursor-pointer" id="upload-label">
                <div class="py-10">
                    <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-camera text-2xl text-blue-600"></i>
                    </div>
                    <p class="text-gray-800 font-bold text-lg">Upload Product</p>
                    <p class="text-gray-400 text-xs mt-1">I'll give you the best street price</p>
                </div>
                <input type="file" id="image-input" class="hidden" accept="image/*">
            </label>

            <div id="loading" class="hidden py-10">
                <div class="loading-spinner"></div>
                <p class="text-sm mt-4 font-bold text-blue-600 animate-pulse">Checking local markets...</p>
            </div>

            <div id="results" class="hidden text-left space-y-4">
                <div class="bg-blue-600 p-5 rounded-2xl text-white shadow-lg">
                    <p class="text-[10px] uppercase font-black opacity-80 tracking-widest">Recommended Price</p>
                    <h3 id="res-price" class="text-3xl font-black"></h3>
                </div>
                <div class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm">
                    <p class="text-[10px] uppercase font-black text-gray-400 mb-2">Social Media Caption</p>
                    <p id="res-caption" class="text-sm text-gray-800 leading-relaxed"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-black text-white rounded-2xl font-black shadow-xl hover:bg-gray-800">SCAN NEW ITEM</button>
            </div>
        </section>
    </main>

    <div id="signup-modal" class="fixed inset-0 z-[100] bg-black bg-opacity-80 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-4">Welcome to SellWise</h2>
            <div class="space-y-4">
                <input type="text" id="reg-name" placeholder="Your Name (e.g. Kwame)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-blue-500">
                <select id="reg-market" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none">
                    <option value="Ghana (GHS)">🇬🇭 Ghana (GHS)</option>
                    <option value="Nigeria (NGN)">🇳🇬 Nigeria (NGN)</option>
                </select>
                <button onclick="saveUser()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">Start Scanning</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Your current API Key
        const API_KEY = "AIzaSyCptEQpCA5j8cWWSwJTeFdEo-qvBNdyoGI";

        window.toggleModal = (show) => { document.getElementById('signup-modal').style.display = show ? 'flex' : 'none'; };

        window.saveUser = () => {
            const name = document.getElementById('reg-name').value;
            const market = document.getElementById('reg-market').value;
            if(!name) return alert("Chale, enter your name first!");
            localStorage.setItem('sw_user', name);
            localStorage.setItem('sw_market', market);
            location.reload();
        };

        const user = localStorage.getItem('sw_user');
        const market = localStorage.getItem('sw_market');

        if(user) {
            document.getElementById('auth-section').innerHTML = `<div class='flex items-center gap-2'><span class='text-xs font-bold text-blue-400'>${user}</span><button onclick='localStorage.clear();location.reload()' class='text-gray-500'><i class="fas fa-sign-out-alt"></i></button></div>`;
            document.getElementById('welcome-msg').classList.remove('hidden');
            document.getElementById('market-display').innerText = market;
        }

        const imageInput = document.getElementById('image-input');
        imageInput.addEventListener('change', async (e) => {
            if(!user) { toggleModal(true); return; }
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('upload-label').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('image-preview').src = URL.createObjectURL(file);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                
                try {
                    // Using Gemini 1.5 Flash (very fast and reliable)
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: `Analyze this product for someone selling in ${market}. 
                                    1. Give a realistic street selling price in the local currency.
                                    2. Write a 2-sentence caption using local slang (e.g. 'Chale' for Ghana, 'No dulling' for Nigeria).
                                    Return ONLY a JSON object like this: {"price": "GH₵ 500", "caption": "your text here"}` },
                                    { inline_data: { mime_type: file.type, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    
                    // Cleaner way to extract the JSON from AI response
                    let rawText = data.candidates[0].content.parts[0].text;
                    const cleanJson = rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1);
                    const result = JSON.parse(cleanJson);

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('results').classList.remove('hidden');
                    document.getElementById('res-price').innerText = result.price;
                    document.getElementById('res-caption').innerText = result.caption;
                } catch (err) {
                    console.error(err);
                    alert("AI is a bit busy. Please try one more time!");
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('upload-label').classList.remove('hidden');
                }
            };
        });
    </script>
</body>
</html>
