<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellWise | AI Reseller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .brand-accent { color: #fcd116; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        #signup-modal { display: none; }
        .loading-spinner { border-top-color: #3498db; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="bg-black text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black">Sell<span class="brand-accent">Wise</span></h1>
            <div id="auth-section">
                <button onclick="toggleModal(true)" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">Sign Up</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-lg">
        <div id="welcome-msg" class="mb-6 hidden text-center">
            <h2 class="text-2xl font-black">Welcome, <span id="user-name-display" class="text-blue-600"></span>!</h2>
            <p class="text-gray-500 text-sm">Targeting <span id="market-display" class="font-bold text-black"></span> market</p>
        </div>

        <section id="main-card" class="glass-card rounded-3xl shadow-xl p-8 border-2 border-dashed border-blue-200 text-center">
            <div id="preview-container" class="hidden mb-4">
                <img id="image-preview" class="w-full h-64 object-cover rounded-2xl shadow-md">
            </div>
            
            <label class="cursor-pointer" id="upload-label">
                <div class="py-10">
                    <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-camera text-2xl text-blue-600"></i>
                    </div>
                    <p class="text-gray-800 font-bold text-lg">Snap Product</p>
                    <p class="text-gray-400 text-xs mt-1">AI will find the best price</p>
                </div>
                <input type="file" id="image-input" class="hidden" accept="image/*">
            </label>

            <div id="loading" class="hidden py-10">
                <div class="loading-spinner w-10 h-10 border-4 border-gray-200 rounded-full mx-auto"></div>
                <p class="text-sm mt-4 font-bold text-blue-600">Gemini is thinking...</p>
            </div>

            <div id="results" class="hidden text-left space-y-4">
                <div class="bg-blue-600 p-4 rounded-2xl text-white">
                    <p class="text-[10px] uppercase font-bold opacity-80">Suggested Price</p>
                    <h3 id="res-price" class="text-2xl font-black"></h3>
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Caption</p>
                    <p id="res-caption" class="text-sm italic text-gray-700 mt-1"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-3 bg-black text-white rounded-xl font-bold">Scan Another</button>
            </div>
        </section>
    </main>

    <div id="signup-modal" class="fixed inset-0 z-[100] bg-black bg-opacity-80 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8">
            <h2 class="text-2xl font-black mb-4">Set Your Market</h2>
            <div class="space-y-4">
                <input type="text" id="reg-name" placeholder="Business Name" class="w-full p-3 bg-gray-100 rounded-xl outline-none border">
                <select id="reg-market" class="w-full p-3 bg-gray-100 rounded-xl outline-none border">
                    <option value="Ghana (GHS)">🇬🇭 Ghana (GHS)</option>
                    <option value="Nigeria (NGN)">🇳🇬 Nigeria (NGN)</option>
                </select>
                <button onclick="saveUser()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">Start Selling</button>
            </div>
        </div>
    </div>

    <script type="module">
        const API_KEY = "AIzaSyCptEQpCA5j8cWWSwJTeFdEo-qvBNdyoGI";

        // UI Helpers
        window.toggleModal = (show) => {
            document.getElementById('signup-modal').style.display = show ? 'flex' : 'none';
        };

        window.saveUser = () => {
            const name = document.getElementById('reg-name').value;
            const market = document.getElementById('reg-market').value;
            if(!name) return alert("Enter a name!");
            localStorage.setItem('sw_user', name);
            localStorage.setItem('sw_market', market);
            location.reload();
        };

        // Load User Session
        const user = localStorage.getItem('sw_user');
        const market = localStorage.getItem('sw_market');

        if(user) {
            document.getElementById('auth-section').innerHTML = `<span class="bg-gray-800 px-3 py-1 rounded-full text-[10px] font-bold">${user}</span>`;
            document.getElementById('welcome-msg').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = user;
            document.getElementById('market-display').innerText = market;
        }

        // Gemini Logic
        const imageInput = document.getElementById('image-input');
        imageInput.addEventListener('change', async (e) => {
            if(!user) { alert("Please Sign Up first!"); return; }
            const file = e.target.files[0];
            if(!file) return;

            // UI Changes
            document.getElementById('upload-label').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('image-preview').src = URL.createObjectURL(file);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: `Identify this product for the ${market} market. Provide: 1. Recommended selling price in the local currency. 2. A short catchy selling caption using local slang (Chale/Omo/No dulling). Return only as JSON: {"price":"","caption":""}` },
                                    { inline_data: { mime_type: file.type, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    const result = JSON.parse(text.replace(/```json|```/g, ''));

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('results').classList.remove('hidden');
                    document.getElementById('res-price').innerText = result.price;
                    document.getElementById('res-caption').innerText = result.caption;
                } catch (err) {
                    alert("AI error. Check your connection.");
                    location.reload();
                }
            };
        });
    </script>
</body>
</html>
